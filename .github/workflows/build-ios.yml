name: Build iOS IPA (Unsigned)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Debug - List files
      run: |
        pwd
        ls -la
        ls -la DataTransferApp/
        ls -la DataTransferApp/DataTransferApp/
    
    - name: Debug - Xcode version
      run: xcodebuild -version
    
    - name: Debug - List schemes
      run: xcodebuild -project DataTransferApp.xcodeproj -list
    
    - name: Build
      run: xcodebuild build -project DataTransferApp.xcodeproj -scheme DataTransferApp -destination 'generic/platform=iOS' -configuration Release CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
