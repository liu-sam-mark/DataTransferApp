name: Build iOS IPA (Unsigned)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Debug - Save project structure
      run: |
        pwd > debug_logs.txt
        echo "---" >> debug_logs.txt
        ls -la >> debug_logs.txt
        echo "---" >> debug_logs.txt
        ls -la DataTransferApp/ >> debug_logs.txt
        echo "---" >> debug_logs.txt
        xcodebuild -version >> debug_logs.txt
        echo "---" >> debug_logs.txt
        xcodebuild -project DataTransferApp.xcodeproj -list >> debug_logs.txt 2>&1
    
    - name: Upload debug logs
      uses: actions/upload-artifact@v4
      with:
        name: debug-logs
        path: debug_logs.txt
